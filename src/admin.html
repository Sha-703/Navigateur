<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAPI - Administration Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: rgba(18, 26, 42, 0.7);
      --bg-card: rgba(22, 34, 56, 0.6);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --success: #10b981;
      --panel-border: rgba(255, 255, 255, 0.08);
      --font-family: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-main);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 span {
      color: var(--accent);
      -webkit-text-fill-color: initial;
    }

    .refresh-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.8);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 1);
      transform: translateY(-2px);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent);
    }

    .stat-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
    }

    /* Filters Bar */
    .filters-bar {
      background: var(--bg-secondary);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .filter-input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 10px 12px;
      color: #fff;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .filter-input:focus {
      border-color: var(--accent);
    }

    /* Table */
    .table-container {
      background: var(--bg-secondary);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background: rgba(0, 0, 0, 0.2);
      padding: 16px 20px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid var(--panel-border);
    }

    td {
      padding: 16px 20px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .mac-address {
      font-family: monospace;
      background: rgba(99, 102, 241, 0.1);
      color: #a5b4fc;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
    }

    .ip-address {
      font-family: monospace;
      color: var(--text-main);
    }

    .date-val {
      color: var(--text-muted);
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--panel-border);
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-body {
      padding: 20px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-header {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-row {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .detail-label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .detail-value {
      font-family: monospace;
      color: #a5b4fc;
    }

    .details-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      font-size: 13px;
    }

    .details-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tableau de Bord <span>WAPI</span></h1>
      <div style="display: flex; gap: 12px;">
        <button id="refresh-btn" class="refresh-btn">Actualiser ↻</button>
        <button id="logout-btn" class="logout-btn">Déconnexion</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Connexions Totales</div>
        <div id="stat-total" class="stat-value">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Utilisateurs Uniques (par MAC)</div>
        <div id="stat-unique" class="stat-value">0</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <div class="filter-group">
        <label for="search-ip">Rechercher par IP (Locale ou Publique)</label>
        <input type="text" id="search-ip" class="filter-input" placeholder="ex: 192.168...">
      </div>
      <div class="filter-group">
        <label for="search-mac">Rechercher par Adresse MAC</label>
        <input type="text" id="search-mac" class="filter-input" placeholder="ex: 00:0A...">
      </div>
      <div class="filter-group">
        <label for="search-date">Filtrer par Date</label>
        <input type="date" id="search-date" class="filter-input">
      </div>
    </div>

    <!-- Connections Table -->
    <div class="table-container">
      <table id="connections-table">
        <thead>
          <tr>
            <th>Adresse MAC</th>
            <th>IP Locale</th>
            <th>IP Publique</th>
            <th>Nombre de Connexions</th>
            <th>Dernière Connexion</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Dynamically populated -->
        </tbody>
      </table>
      <div id="empty-state" class="empty-state hidden">Aucun utilisateur ne correspond aux critères de recherche.</div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Détails de l'Utilisateur</h2>
          <button id="close-modal-btn" class="close-btn">&times;</button>
        </div>
        <div id="modal-details" class="modal-body">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

  </div>

  <script src="admin-renderer.js"></script>
</body>
</html>
