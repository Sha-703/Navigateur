<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Traduction - WAPI</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #333; }
    p { color: #666; line-height: 1.6; }
    button { padding: 10px 15px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    #result { margin-top: 20px; padding: 10px; background: #e8f5e9; border-left: 4px solid #4caf50; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test Traduction MyMemory</h1>
    <p>
      Ceci est un texte de test pour la traduction. 
      Bienvenue dans le navigateur WAPI Browser. 
      Cette application permet de naviguer sur internet avec des informations réseau.
    </p>
    
    <select id="language">
      <option value="en-US">English</option>
      <option value="es-ES">Español</option>
      <option value="de-DE">Deutsch</option>
      <option value="it-IT">Italiano</option>
      <option value="pt-PT">Português</option>
      <option value="ja-JP">日本語</option>
      <option value="zh-CN">中文</option>
      <option value="ru-RU">Русский</option>
      <option value="ar-SA">العربية</option>
      <option value="hi-IN">हिन्दी</option>
      <option value="ko-KR">한국어</option>
    </select>
    
    <button onclick="testTranslate()">Tester Traduction</button>
    
    <div id="result"></div>
  </div>

  <script>
    async function testTranslate() {
      const lang = document.getElementById('language').value;
      const result = document.getElementById('result');
      result.textContent = 'Traduction en cours...';
      
      try {
        // Texte à traduire
        const text = 'Welcome to WAPI Browser. This is a test translation.';
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${lang}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.responseData.translatedText) {
          result.innerHTML = `<strong>Succès !</strong><br>Original: ${text}<br>Traduit: ${data.responseData.translatedText}`;
        } else {
          result.textContent = 'Erreur: pas de traduction reçue';
        }
      } catch (error) {
        result.textContent = `Erreur: ${error.message}`;
      }
    }
  </script>
</body>
</html>
